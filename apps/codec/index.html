<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编解码工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 28px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .section {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
            transition: box-shadow 0.3s;
        }

        .section:hover {
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.12);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .section-title .icon.base64 {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
        }

        .section-title .icon.uri {
            background: linear-gradient(135deg, #34d399, #059669);
        }

        .codec-row {
            display: flex;
            align-items: stretch;
            gap: 16px;
        }

        .textarea-wrap {
            flex: 5;
            display: flex;
            flex-direction: column;
        }

        .textarea-wrap label {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 160px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: #e5e7eb;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: rgba(139, 92, 246, 0.6);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        textarea::placeholder {
            color: #4b5563;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.25s;
        }

        .btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.encode {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
        }

        .btn.encode:hover {
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        .btn.decode {
            background: linear-gradient(135deg, #059669, #34d399);
            color: #fff;
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.35);
        }

        .btn.decode:hover {
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.5);
        }

        .btn.copy {
            background: rgba(255, 255, 255, 0.08);
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 20px;
            font-size: 0.78rem;
        }

        .btn.copy:hover {
            color: #e5e7eb;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            z-index: 9999;
            opacity: 0;
            transform: translateY(-12px);
            transition: all 0.35s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #059669, #34d399);
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.4);
        }

        .toast.error {
            background: linear-gradient(135deg, #dc2626, #f87171);
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
        }

        .toast.info {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        @media (max-width: 768px) {
            .codec-row {
                flex-direction: column;
            }

            .btn-group {
                flex-direction: row;
                justify-content: center;
                padding: 4px 0;
            }

            body {
                padding: 20px 12px;
            }

            .section {
                padding: 20px 16px;
            }

            textarea {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>编解码</h1>

        <!-- Base64 Section -->
        <div class="section">
            <div class="section-title">
                <span class="icon base64">B</span>
                Base64 编解码
            </div>
            <div class="codec-row">
                <div class="textarea-wrap">
                    <label>输入</label>
                    <textarea id="b64Input" placeholder="在此输入需要编码或解码的文本..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn encode" onclick="base64Encode()">编码</button>
                    <button class="btn decode" onclick="base64Decode()">解码</button>
                    <button class="btn copy" onclick="copyOutput('b64Output')">复制结果</button>
                </div>
                <div class="textarea-wrap">
                    <label>输出</label>
                    <textarea id="b64Output" placeholder="结果将显示在这里..." readonly></textarea>
                </div>
            </div>
        </div>

        <!-- URI Section -->
        <div class="section">
            <div class="section-title">
                <span class="icon uri">U</span>
                URI 编解码
            </div>
            <div class="codec-row">
                <div class="textarea-wrap">
                    <label>输入</label>
                    <textarea id="uriInput" placeholder="在此输入需要编码或解码的 URI..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn encode" onclick="uriEncode()">编码</button>
                    <button class="btn decode" onclick="uriDecode()">解码</button>
                    <button class="btn copy" onclick="copyOutput('uriOutput')">复制结果</button>
                </div>
                <div class="textarea-wrap">
                    <label>输出</label>
                    <textarea id="uriOutput" placeholder="结果将显示在这里..." readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function () {
                toast.classList.remove('show');
            }, 2000);
        }

        function base64Encode() {
            var input = document.getElementById('b64Input').value;
            if (!input) {
                showToast('请输入需要编码的文本', 'error');
                return;
            }
            try {
                var encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('b64Output').value = encoded;
                showToast('Base64 编码成功', 'success');
            } catch (e) {
                showToast('编码失败: ' + e.message, 'error');
            }
        }

        function base64Decode() {
            var input = document.getElementById('b64Input').value;
            if (!input) {
                showToast('请输入需要解码的文本', 'error');
                return;
            }
            try {
                var decoded = decodeURIComponent(escape(atob(input.trim())));
                document.getElementById('b64Output').value = decoded;
                showToast('Base64 解码成功', 'success');
            } catch (e) {
                showToast('解码失败: 输入不是有效的 Base64 字符串', 'error');
            }
        }

        function uriEncode() {
            var input = document.getElementById('uriInput').value;
            if (!input) {
                showToast('请输入需要编码的 URI', 'error');
                return;
            }
            try {
                var encoded = encodeURIComponent(input);
                document.getElementById('uriOutput').value = encoded;
                showToast('URI 编码成功', 'success');
            } catch (e) {
                showToast('编码失败: ' + e.message, 'error');
            }
        }

        function uriDecode() {
            var input = document.getElementById('uriInput').value;
            if (!input) {
                showToast('请输入需要解码的 URI', 'error');
                return;
            }
            try {
                var decoded = decodeURIComponent(input.trim());
                document.getElementById('uriOutput').value = decoded;
                showToast('URI 解码成功', 'success');
            } catch (e) {
                showToast('解码失败: 输入不是有效的编码 URI', 'error');
            }
        }

        function copyOutput(id) {
            var output = document.getElementById(id);
            if (!output.value) {
                showToast('没有可复制的内容', 'info');
                return;
            }
            navigator.clipboard.writeText(output.value).then(function () {
                showToast('已复制到剪贴板', 'success');
            }).catch(function () {
                output.select();
                document.execCommand('copy');
                showToast('已复制到剪贴板', 'success');
            });
        }
    </script>
</body>
</html>
