<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化 & 压缩工具</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-input: #0f0f15;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #27273a;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 50% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* 网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        /* 头部 */
        header {
            position: relative;
            z-index: 10;
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* 主容器 */
        main {
            position: relative;
            z-index: 10;
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 32px 32px;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 6px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-input);
            border-color: var(--accent-primary);
        }

        .btn-icon {
            padding: 10px;
            font-size: 16px;
        }

        /* 选项 */
        .option-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            user-select: none;
        }

        .option-label:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .option-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        /* 编辑器区域 */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 220px);
            min-height: 500px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: box-shadow 0.3s ease;
        }

        .editor-panel:hover {
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .panel-title-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 14px;
        }

        .panel-actions {
            display: flex;
            gap: 6px;
        }

        .panel-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .panel-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-primary);
            background: var(--bg-input);
        }

        .panel-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .code-editor {
            width: 100%;
            height: 100%;
            padding: 16px 18px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-input);
            border: none;
            resize: none;
            outline: none;
            tab-size: 2;
        }

        .code-editor::placeholder {
            color: var(--text-muted);
        }

        /* 行号 */
        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            width: 50px;
            height: 100%;
            padding: 16px 8px;
            background: var(--bg-input);
            border-right: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-muted);
            text-align: right;
            overflow: hidden;
            user-select: none;
        }

        .code-editor.with-line-numbers {
            padding-left: 66px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 18px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-success { color: var(--success); }
        .status-error { color: var(--error); }

        /* Toast 提示 */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            min-width: 200px;
        }

        .toast-success {
            border-left: 3px solid var(--success);
        }

        .toast-error {
            border-left: 3px solid var(--error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(10px);
            }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .editor-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                height: auto;
                min-height: 800px;
            }
        }

        @media (max-width: 640px) {
            header, main {
                padding-left: 16px;
                padding-right: 16px;
            }

            .toolbar {
                justify-content: center;
            }

            .editor-container {
                min-height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="grid-overlay"></div>

    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">{ }</div>
                <div>
                    <div class="logo-text">JSON Tool</div>
                    <div class="logo-subtitle">格式化 & 压缩工具</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="loadExample()">
                    <span>示例</span>
                </button>
                <button class="btn btn-secondary" onclick="clearAll()">
                    <span>清空</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn btn-primary" onclick="formatJSON()">
                    <span>格式化</span>
                </button>
                <button class="btn btn-primary" onclick="compressJSON()">
                    <span>压缩</span>
                </button>
            </div>
            <div class="toolbar-group">
                <label class="option-label">
                    <input type="checkbox" id="unescapeCheck" checked>
                    <span>去除 Java 转义</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" id="sortKeysCheck">
                    <span>排序键名</span>
                </label>
            </div>
            <div class="toolbar-group">
                <button class="btn btn-secondary btn-icon" onclick="copyOutput()" title="复制结果">
                    <span>复制</span>
                </button>
                <button class="btn btn-secondary btn-icon" onclick="downloadJSON()" title="下载文件">
                    <span>下载</span>
                </button>
            </div>
        </div>

        <div class="editor-container">
            <!-- 输入面板 -->
            <div class="editor-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon">📥</span>
                        <span>输入 JSON</span>
                    </div>
                    <div class="panel-actions">
                        <button class="panel-btn" onclick="pasteInput()">粘贴</button>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="line-numbers" id="inputLineNumbers">1</div>
                    <textarea 
                        class="code-editor with-line-numbers" 
                        id="inputEditor"
                        placeholder="在此粘贴 JSON 数据...&#10;&#10;支持直接从 Java 字符串复制，会自动处理转义字符"
                        oninput="updateLineNumbers('input')"
                        onscroll="syncScroll('input')"
                    ></textarea>
                </div>
                <div class="status-bar">
                    <div class="status-item">
                        <span>字符数:</span>
                        <span id="inputCharCount">0</span>
                    </div>
                    <div class="status-item">
                        <span>行数:</span>
                        <span id="inputLineCount">1</span>
                    </div>
                </div>
            </div>

            <!-- 输出面板 -->
            <div class="editor-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon">📤</span>
                        <span>输出结果</span>
                    </div>
                    <div class="panel-actions">
                        <button class="panel-btn" onclick="copyOutput()">复制</button>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="line-numbers" id="outputLineNumbers">1</div>
                    <textarea 
                        class="code-editor with-line-numbers" 
                        id="outputEditor"
                        placeholder="处理后的 JSON 将显示在这里..."
                        readonly
                        onscroll="syncScroll('output')"
                    ></textarea>
                </div>
                <div class="status-bar">
                    <div class="status-item" id="statusText">
                        <span>等待处理...</span>
                    </div>
                    <div class="status-item">
                        <span>字符数:</span>
                        <span id="outputCharCount">0</span>
                    </div>
                    <div class="status-item">
                        <span>行数:</span>
                        <span id="outputLineCount">1</span>
                    </div>
                    <div class="status-item">
                        <span>压缩率:</span>
                        <span id="compressionRatio">-</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // 更新行号
        function updateLineNumbers(type) {
            const editor = document.getElementById(type + 'Editor');
            const lineNumbers = document.getElementById(type + 'LineNumbers');
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
            
            // 更新统计
            document.getElementById(type + 'CharCount').textContent = editor.value.length;
            document.getElementById(type + 'LineCount').textContent = lines;
        }

        // 同步滚动
        function syncScroll(type) {
            const editor = document.getElementById(type + 'Editor');
            const lineNumbers = document.getElementById(type + 'LineNumbers');
            lineNumbers.scrollTop = editor.scrollTop;
        }

        // 去除 Java 字符串转义
        function unescapeJavaString(str) {
            if (!document.getElementById('unescapeCheck').checked) {
                return str;
            }
            
            // 处理常见的 Java 字符串转义
            return str
                .replace(/^"/, '')  // 去除开头的引号
                .replace(/"$/, '')  // 去除结尾的引号
                .replace(/\\"/g, '"')  // \" -> "
                .replace(/\\\\/g, '\\')  // \\ -> \
                .replace(/\\n/g, '\n')   // \n -> 换行
                .replace(/\\r/g, '\r')   // \r -> 回车
                .replace(/\\t/g, '\t')   // \t -> 制表符
                .replace(/\\b/g, '\b')   // \b -> 退格
                .replace(/\\f/g, '\f')   // \f -> 换页
                .replace(/\\\//g, '/');  // \/ -> /
        }

        // 解析 JSON
        function parseJSON(str) {
            try {
                // 首先尝试直接解析
                return JSON.parse(str);
            } catch (e) {
                // 如果失败，尝试去除 Java 转义后再解析
                const unescaped = unescapeJavaString(str);
                return JSON.parse(unescaped);
            }
        }

        // 格式化 JSON
        function formatJSON() {
            const input = document.getElementById('inputEditor').value.trim();
            if (!input) {
                showToast('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const data = parseJSON(input);
                const shouldSort = document.getElementById('sortKeysCheck').checked;
                
                let formatted;
                if (shouldSort) {
                    formatted = JSON.stringify(sortObjectKeys(data), null, 2);
                } else {
                    formatted = JSON.stringify(data, null, 2);
                }
                
                document.getElementById('outputEditor').value = formatted;
                updateLineNumbers('output');
                updateStatus('格式化成功', 'success');
                updateCompressionRatio(input.length, formatted.length);
            } catch (e) {
                showToast('JSON 格式错误: ' + e.message, 'error');
                updateStatus('格式化失败', 'error');
            }
        }

        // 压缩 JSON
        function compressJSON() {
            const input = document.getElementById('inputEditor').value.trim();
            if (!input) {
                showToast('请输入 JSON 数据', 'error');
                return;
            }

            try {
                const data = parseJSON(input);
                const shouldSort = document.getElementById('sortKeysCheck').checked;
                
                let compressed;
                if (shouldSort) {
                    compressed = JSON.stringify(sortObjectKeys(data));
                } else {
                    compressed = JSON.stringify(data);
                }
                
                document.getElementById('outputEditor').value = compressed;
                updateLineNumbers('output');
                updateStatus('压缩成功', 'success');
                updateCompressionRatio(input.length, compressed.length);
            } catch (e) {
                showToast('JSON 格式错误: ' + e.message, 'error');
                updateStatus('压缩失败', 'error');
            }
        }

        // 排序对象键名
        function sortObjectKeys(obj) {
            if (Array.isArray(obj)) {
                return obj.map(sortObjectKeys);
            } else if (obj !== null && typeof obj === 'object') {
                const sorted = {};
                Object.keys(obj).sort().forEach(key => {
                    sorted[key] = sortObjectKeys(obj[key]);
                });
                return sorted;
            }
            return obj;
        }

        // 更新状态
        function updateStatus(message, type) {
            const statusText = document.getElementById('statusText');
            statusText.innerHTML = `<span class="status-${type}">${message}</span>`;
        }

        // 更新压缩率
        function updateCompressionRatio(original, compressed) {
            const ratio = ((1 - compressed / original) * 100).toFixed(1);
            const ratioText = ratio > 0 ? `-${ratio}%` : `+${Math.abs(ratio)}%`;
            document.getElementById('compressionRatio').textContent = ratioText;
            document.getElementById('outputCharCount').textContent = compressed;
        }

        // 复制输出
        async function copyOutput() {
            const output = document.getElementById('outputEditor').value;
            if (!output) {
                showToast('没有可复制的内容', 'error');
                return;
            }

            try {
                await navigator.clipboard.writeText(output);
                showToast('已复制到剪贴板', 'success');
            } catch (e) {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = output;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            }
        }

        // 粘贴输入
        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputEditor').value = text;
                updateLineNumbers('input');
                showToast('已粘贴', 'success');
            } catch (e) {
                showToast('无法访问剪贴板', 'error');
            }
        }

        // 清空
        function clearAll() {
            document.getElementById('inputEditor').value = '';
            document.getElementById('outputEditor').value = '';
            updateLineNumbers('input');
            updateLineNumbers('output');
            document.getElementById('compressionRatio').textContent = '-';
            updateStatus('等待处理...', 'normal');
            showToast('已清空', 'success');
        }

        // 加载示例
        function loadExample() {
            const example = {
                "name": "JSON Tool",
                "version": "1.0.0",
                "features": ["格式化", "压缩", "去除转义"],
                "config": {
                    "theme": "dark",
                    "autoFormat": true
                },
                "metadata": {
                    "created": "2024-01-01",
                    "author": "Developer"
                }
            };
            
            // Java 字符串格式的示例
            const javaExample = JSON.stringify(JSON.stringify(example));
            
            document.getElementById('inputEditor').value = javaExample;
            updateLineNumbers('input');
            showToast('已加载示例（Java 字符串格式）', 'success');
        }

        // 下载 JSON
        function downloadJSON() {
            const output = document.getElementById('outputEditor').value;
            if (!output) {
                showToast('没有可下载的内容', 'error');
                return;
            }

            const blob = new Blob([output], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'output.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('已下载', 'success');
        }

        // 显示 Toast
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' ? '✓' : '✗';
            toast.innerHTML = `
                <span style="font-weight: 600;">${icon}</span>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 监听输入变化
        document.getElementById('inputEditor').addEventListener('input', function() {
            updateLineNumbers('input');
        });

        // 初始化
        updateLineNumbers('input');
        updateLineNumbers('output');
    </script>
</body>
</html>
